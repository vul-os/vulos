<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Media Gallery</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surface:#111;--elevated:#1a1a1a;--border:#222;--border2:#333;--text:#e5e5e5;--text2:#999;--text3:#666;--accent:#3b82f6;--danger:#ef4444;--fav:#f59e0b}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:200px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--surface)}
.sidebar h2{padding:14px 16px 8px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:600}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.sidebar .nav-item:hover{background:var(--elevated);color:var(--text)}
.sidebar .nav-item.active{background:var(--elevated);color:var(--text);border-left-color:var(--accent)}
.sidebar .nav-item .icon{font-size:15px;width:20px;text-align:center}
.sidebar .nav-item .count{margin-left:auto;font-size:11px;color:var(--text3)}
.sidebar .albums{flex:1;overflow-y:auto;padding-bottom:12px}
.sidebar .album-item{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s}
.sidebar .album-item:hover{background:var(--elevated);color:var(--text)}
.sidebar .album-item.active{background:var(--elevated);color:var(--text)}
.sidebar .album-thumb{width:28px;height:28px;border-radius:4px;object-fit:cover;background:var(--elevated)}

/* Main content */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.toolbar .title{font-size:14px;font-weight:600;min-width:0;white-space:nowrap}
.toolbar .spacer{flex:1}
.toolbar input{background:var(--elevated);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--text);font-size:13px;outline:none;width:240px}
.toolbar input:focus{border-color:#555}
.toolbar .btn{background:var(--elevated);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.toolbar .btn:hover{background:var(--border2);color:var(--text)}
.toolbar .btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Grid */
.content{flex:1;overflow-y:auto;padding:12px}
.date-group{margin-bottom:20px}
.date-label{font-size:12px;font-weight:600;color:var(--text2);padding:4px 4px 8px;position:sticky;top:0;background:var(--bg);z-index:2}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:3px}
.grid .thumb{aspect-ratio:1;background:var(--surface);border-radius:4px;overflow:hidden;cursor:pointer;position:relative;transition:transform .1s}
.grid .thumb:hover{transform:scale(1.02);z-index:1}
.grid .thumb img,.grid .thumb video{width:100%;height:100%;object-fit:cover;display:block}
.grid .thumb .overlay{position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:flex-end;padding:6px;opacity:0;transition:opacity .15s}
.grid .thumb:hover .overlay{opacity:1}
.grid .thumb .fav-star{font-size:16px;cursor:pointer;filter:drop-shadow(0 1px 2px #000);color:rgba(255,255,255,.6)}
.grid .thumb .fav-star.on{color:var(--fav);opacity:1}
.grid .thumb .badge{position:absolute;bottom:6px;right:6px;background:#000a;border-radius:4px;padding:2px 6px;font-size:10px;color:#fff}
.grid .thumb .dur{position:absolute;bottom:6px;right:6px;background:#000a;border-radius:4px;padding:2px 6px;font-size:10px}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:.3}
.empty p{font-size:14px}

/* Lightbox viewer */
.viewer{position:fixed;inset:0;background:#000f;z-index:200;display:none;flex-direction:column}
.viewer.open{display:flex}
.viewer .viewer-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#111;z-index:2}
.viewer .viewer-bar .name{font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.viewer .viewer-bar .vbtn{background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;padding:4px 8px;border-radius:4px}
.viewer .viewer-bar .vbtn:hover{background:#222;color:var(--text)}
.viewer .viewer-body{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}
.viewer .viewer-body img,.viewer .viewer-body video{max-width:95%;max-height:95%;object-fit:contain}
.viewer .nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:#000a;border:none;color:#fff;font-size:24px;padding:12px 16px;cursor:pointer;z-index:3;border-radius:8px}
.viewer .nav-btn:hover{background:#333}
.viewer .nav-prev{left:16px}
.viewer .nav-next{right:16px}

/* Info panel */
.info-panel{position:fixed;top:0;right:-340px;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--border);z-index:210;transition:right .25s;overflow-y:auto;padding:20px}
.info-panel.open{right:0}
.info-panel h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:16px 0 8px;font-weight:600}
.info-panel h3:first-child{margin-top:0}
.info-panel .row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.info-panel .row .label{color:var(--text3)}
.info-panel .row .value{color:var(--text);text-align:right;max-width:60%;word-break:break-all}
.info-panel .preview{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:8px;margin-bottom:12px}
.info-panel .ai-desc{font-size:12px;line-height:1.5;color:var(--text2);padding:8px 12px;background:var(--elevated);border-radius:8px;margin-top:8px}
.info-panel .ai-btn{display:block;width:100%;margin-top:8px;padding:6px;background:var(--elevated);border:1px solid var(--border2);border-radius:6px;color:var(--accent);font-size:12px;cursor:pointer;text-align:center}
.info-panel .ai-btn:hover{background:var(--border2)}
.info-panel .close-info{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Library</h2>
  <div class="nav-item active" data-view="all" onclick="switchView('all')">
    <span class="icon">&#9633;</span> All Media <span class="count" id="countAll"></span>
  </div>
  <div class="nav-item" data-view="photos" onclick="switchView('photos')">
    <span class="icon">&#9634;</span> Photos <span class="count" id="countPhotos"></span>
  </div>
  <div class="nav-item" data-view="videos" onclick="switchView('videos')">
    <span class="icon">&#9654;</span> Videos <span class="count" id="countVideos"></span>
  </div>
  <div class="nav-item" data-view="favorites" onclick="switchView('favorites')">
    <span class="icon">&#9733;</span> Favorites <span class="count" id="countFavs"></span>
  </div>

  <h2>Albums</h2>
  <div class="albums" id="albumList"></div>
</div>

<!-- Main content -->
<div class="main">
  <div class="toolbar">
    <div class="title" id="viewTitle">All Media</div>
    <div class="spacer"></div>
    <input id="searchInput" type="text" placeholder="Search with AI..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn" onclick="doSearch()">Search</button>
    <button class="btn" id="gridSizeBtn" onclick="toggleGridSize()">&#9638;</button>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- Lightbox -->
<div class="viewer" id="viewer">
  <div class="viewer-bar">
    <span class="name" id="viewerName"></span>
    <button class="vbtn" onclick="toggleFavViewer()" id="viewerFav">&#9734;</button>
    <button class="vbtn" onclick="showInfo()">&#8505;</button>
    <button class="vbtn" onclick="deleteViewer()">&#128465;</button>
    <button class="vbtn" onclick="closeViewer()">&#10005;</button>
  </div>
  <div class="viewer-body" id="viewerBody">
    <button class="nav-btn nav-prev" onclick="navViewer(-1)">&#8249;</button>
    <button class="nav-btn nav-next" onclick="navViewer(1)">&#8250;</button>
  </div>
</div>

<!-- Info Panel -->
<div class="info-panel" id="infoPanel">
  <button class="close-info" onclick="closeInfo()">&#10005;</button>
  <div id="infoPanelContent"></div>
</div>

<script>
let allMedia = [], currentView = 'all', currentAlbum = null, viewerItems = [], viewerIdx = 0;
let gridLarge = false;

// --- Data loading ---
async function loadMedia() {
  const res = await fetch('/api/media');
  allMedia = await res.json();
  updateCounts();
  renderCurrentView();
  loadAlbums();
}

async function loadAlbums() {
  const res = await fetch('/api/albums');
  const albums = await res.json();
  const el = document.getElementById('albumList');
  el.innerHTML = albums.map(a => `
    <div class="album-item${currentAlbum === a.path ? ' active' : ''}" onclick="switchAlbum('${a.path}')">
      ${a.cover ? `<img class="album-thumb" src="/media/${a.cover}" loading="lazy">` : '<div class="album-thumb"></div>'}
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</span>
      <span style="font-size:11px;color:var(--text3)">${a.count}</span>
    </div>
  `).join('');
}

function updateCounts() {
  document.getElementById('countAll').textContent = allMedia.length;
  document.getElementById('countPhotos').textContent = allMedia.filter(m => m.type === 'image').length;
  document.getElementById('countVideos').textContent = allMedia.filter(m => m.type === 'video').length;
  document.getElementById('countFavs').textContent = allMedia.filter(m => m.favorite).length;
}

// --- Views ---
function switchView(view) {
  currentView = view;
  currentAlbum = null;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  document.querySelectorAll('.album-item').forEach(el => el.classList.remove('active'));
  const titles = { all: 'All Media', photos: 'Photos', videos: 'Videos', favorites: 'Favorites' };
  document.getElementById('viewTitle').textContent = titles[view] || view;
  renderCurrentView();
}

function switchAlbum(folder) {
  currentView = 'album';
  currentAlbum = folder;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.album-item').forEach(el =>
    el.classList.toggle('active', el.textContent.includes(folder.split('/').pop()))
  );
  document.getElementById('viewTitle').textContent = folder.split('/').pop() || 'Root';
  renderCurrentView();
}

function getFiltered() {
  if (currentView === 'photos') return allMedia.filter(m => m.type === 'image');
  if (currentView === 'videos') return allMedia.filter(m => m.type === 'video');
  if (currentView === 'favorites') return allMedia.filter(m => m.favorite);
  if (currentView === 'album') return allMedia.filter(m => m.folder === currentAlbum);
  return allMedia;
}

function renderCurrentView() {
  const items = getFiltered();
  viewerItems = items;
  const content = document.getElementById('content');

  if (items.length === 0) {
    content.innerHTML = '<div class="empty"><div class="icon">&#9634;</div><p>No media found</p></div>';
    return;
  }

  // Group by date
  const groups = {};
  for (const m of items) {
    const date = m.date || 'Unknown';
    if (!groups[date]) groups[date] = [];
    groups[date].push(m);
  }

  const colSize = gridLarge ? '200px' : '150px';
  let html = '';
  for (const [date, media] of Object.entries(groups)) {
    const d = new Date(date + 'T00:00:00');
    const label = isNaN(d) ? date : d.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    html += `<div class="date-group"><div class="date-label">${label} &mdash; ${media.length} items</div>`;
    html += `<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(${colSize},1fr))">`;
    for (const m of media) {
      const idx = items.indexOf(m);
      const esc = m.path.replace(/'/g, "\\'");
      if (m.type === 'video') {
        html += `<div class="thumb" onclick="openViewer(${idx})">
          <video src="/media/${m.path}" muted preload="metadata"></video>
          <div class="overlay"><span class="fav-star${m.favorite ? ' on' : ''}" onclick="event.stopPropagation();toggleFav('${esc}',this)">${m.favorite ? '&#9733;' : '&#9734;'}</span></div>
          <div class="dur">&#9654;</div>
        </div>`;
      } else {
        html += `<div class="thumb" onclick="openViewer(${idx})">
          <img src="/media/${m.path}" loading="lazy">
          <div class="overlay"><span class="fav-star${m.favorite ? ' on' : ''}" onclick="event.stopPropagation();toggleFav('${esc}',this)">${m.favorite ? '&#9733;' : '&#9734;'}</span></div>
        </div>`;
      }
    }
    html += '</div></div>';
  }
  content.innerHTML = html;
}

function toggleGridSize() {
  gridLarge = !gridLarge;
  renderCurrentView();
}

// --- Favorites ---
async function toggleFav(path, el) {
  const item = allMedia.find(m => m.path === path);
  if (!item) return;
  const add = !item.favorite;
  await fetch('/api/favorite', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, add }),
  });
  item.favorite = add;
  if (el) {
    el.classList.toggle('on', add);
    el.innerHTML = add ? '&#9733;' : '&#9734;';
  }
  updateCounts();
  // Re-render if on favorites view
  if (currentView === 'favorites') renderCurrentView();
}

// --- Search ---
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { renderCurrentView(); return; }
  document.getElementById('viewTitle').textContent = 'Search: ' + q;
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(q));
    const results = await res.json();
    viewerItems = results;
    const content = document.getElementById('content');
    if (results.length === 0) {
      content.innerHTML = '<div class="empty"><div class="icon">&#128269;</div><p>No results for "' + q + '"</p></div>';
      return;
    }
    const colSize = gridLarge ? '200px' : '150px';
    let html = `<div class="date-group"><div class="date-label">${results.length} results</div>`;
    html += `<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(${colSize},1fr))">`;
    for (let i = 0; i < results.length; i++) {
      const m = results[i];
      if (m.type === 'video') {
        html += `<div class="thumb" onclick="openViewer(${i})"><video src="/media/${m.path}" muted preload="metadata"></video><div class="dur">&#9654;</div></div>`;
      } else {
        html += `<div class="thumb" onclick="openViewer(${i})"><img src="/media/${m.path}" loading="lazy"></div>`;
      }
    }
    html += '</div></div>';
    content.innerHTML = html;
  } catch {
    document.getElementById('content').innerHTML = '<div class="empty"><p>Search failed</p></div>';
  }
}

// --- Lightbox viewer ---
function openViewer(idx) {
  viewerIdx = idx;
  renderViewer();
  document.getElementById('viewer').classList.add('open');
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('viewerBody').querySelector('video')?.pause?.();
  closeInfo();
}

function navViewer(dir) {
  viewerIdx = (viewerIdx + dir + viewerItems.length) % viewerItems.length;
  renderViewer();
}

function renderViewer() {
  const m = viewerItems[viewerIdx];
  if (!m) return;
  document.getElementById('viewerName').textContent = m.name || m.path.split('/').pop();
  const body = document.getElementById('viewerBody');
  const navPrev = body.querySelector('.nav-prev');
  const navNext = body.querySelector('.nav-next');
  // Remove old media
  const old = body.querySelector('.viewer-media');
  if (old) old.remove();
  if (m.type === 'video') {
    const el = document.createElement('video');
    el.className = 'viewer-media';
    el.src = '/media/' + m.path;
    el.controls = true;
    el.autoplay = true;
    body.insertBefore(el, navPrev);
  } else {
    const el = document.createElement('img');
    el.className = 'viewer-media';
    el.src = '/media/' + m.path;
    body.insertBefore(el, navPrev);
  }
  // Update fav button
  const favBtn = document.getElementById('viewerFav');
  favBtn.innerHTML = m.favorite ? '&#9733;' : '&#9734;';
  favBtn.style.color = m.favorite ? 'var(--fav)' : '';
}

function toggleFavViewer() {
  const m = viewerItems[viewerIdx];
  if (!m) return;
  const add = !m.favorite;
  fetch('/api/favorite', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: m.path, add }),
  });
  m.favorite = add;
  const orig = allMedia.find(o => o.path === m.path);
  if (orig) orig.favorite = add;
  renderViewer();
  updateCounts();
}

async function deleteViewer() {
  const m = viewerItems[viewerIdx];
  if (!m || !confirm('Delete ' + (m.name || m.path) + '?')) return;
  await fetch('/api/delete', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: m.path }),
  });
  allMedia = allMedia.filter(o => o.path !== m.path);
  viewerItems.splice(viewerIdx, 1);
  updateCounts();
  if (viewerItems.length === 0) { closeViewer(); renderCurrentView(); return; }
  if (viewerIdx >= viewerItems.length) viewerIdx = viewerItems.length - 1;
  renderViewer();
  renderCurrentView();
}

// --- Info panel ---
async function showInfo() {
  const m = viewerItems[viewerIdx];
  if (!m) return;
  const panel = document.getElementById('infoPanel');
  const content = document.getElementById('infoPanelContent');
  content.innerHTML = '<p style="color:var(--text3);font-size:12px">Loading...</p>';
  panel.classList.add('open');

  try {
    const res = await fetch('/api/info?path=' + encodeURIComponent(m.path));
    const info = await res.json();
    let html = `<img class="preview" src="/media/${m.path}">`;
    html += `<h3>File</h3>`;
    html += infoRow('Name', info.name);
    html += infoRow('Size', info.size_human);
    html += infoRow('Type', info.ext?.toUpperCase().slice(1));
    if (info.width) html += infoRow('Dimensions', info.width + ' x ' + info.height);
    html += infoRow('Modified', new Date(info.modified).toLocaleString());
    html += infoRow('Path', info.path);

    if (info.exif) {
      html += '<h3>Camera</h3>';
      if (info.exif.make) html += infoRow('Make', info.exif.make);
      if (info.exif.model) html += infoRow('Model', info.exif.model);
      if (info.exif.date_taken) html += infoRow('Taken', info.exif.date_taken);
      if (info.exif.exposure_time) html += infoRow('Exposure', info.exif.exposure_time + 's');
      if (info.exif.f_number) html += infoRow('Aperture', 'f/' + info.exif.f_number);
      if (info.exif.iso) html += infoRow('ISO', info.exif.iso);
      if (info.exif.focal_length) html += infoRow('Focal Length', info.exif.focal_length + 'mm');
    }

    html += '<h3>AI</h3>';
    html += '<div id="aiDesc" class="ai-desc" style="color:var(--text3);font-style:italic">Not yet described</div>';
    html += `<button class="ai-btn" onclick="describeImage('${m.path.replace(/'/g, "\\'")}')">Describe with AI</button>`;

    content.innerHTML = html;
  } catch {
    content.innerHTML = '<p style="color:var(--text3)">Could not load info</p>';
  }
}

function infoRow(label, value) {
  return `<div class="row"><span class="label">${label}</span><span class="value">${value || '—'}</span></div>`;
}

async function describeImage(path) {
  const el = document.getElementById('aiDesc');
  if (!el) return;
  el.textContent = 'Thinking...';
  el.style.fontStyle = 'italic';
  try {
    const res = await fetch('/api/describe?path=' + encodeURIComponent(path));
    const data = await res.json();
    el.textContent = data.description || 'No description.';
    el.style.fontStyle = 'normal';
  } catch {
    el.textContent = 'Failed to describe.';
  }
}

function closeInfo() {
  document.getElementById('infoPanel').classList.remove('open');
}

// --- Keyboard shortcuts ---
document.addEventListener('keydown', e => {
  const viewer = document.getElementById('viewer');
  if (!viewer.classList.contains('open')) return;
  if (e.key === 'Escape') closeViewer();
  if (e.key === 'ArrowLeft') navViewer(-1);
  if (e.key === 'ArrowRight') navViewer(1);
  if (e.key === 'f') toggleFavViewer();
  if (e.key === 'i') showInfo();
  if (e.key === 'Delete' || e.key === 'Backspace') deleteViewer();
});

// --- Init ---
loadMedia();
</script>
</body>
</html>
