name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # Build and push Docker image
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build flashable bare-metal images (Debian Trixie)
      - name: Build system images
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          for ARCH in amd64 arm64; do
            LABEL="x86_64"
            [ "$ARCH" = "arm64" ] && LABEL="arm64"
            echo "Building ${LABEL} system image..."
            sudo ARCH=$ARCH ./build.sh --output "output-${ARCH}"

            # Create a bootable disk image from the rootfs
            IMG="vulos-${VERSION}-${LABEL}.img"
            truncate -s 4G "$IMG"
            LOOP=$(sudo losetup --find --show "$IMG")
            sudo parted "$LOOP" mklabel gpt
            sudo parted "$LOOP" mkpart primary ext4 1MiB 100%
            sudo partprobe "$LOOP"
            sudo mkfs.ext4 -L vulos "${LOOP}p1"
            MNT=$(mktemp -d)
            sudo mount "${LOOP}p1" "$MNT"
            sudo cp -a "output-${ARCH}/." "$MNT/"
            if [ "$ARCH" = "amd64" ]; then
              sudo grub-install --target=x86_64-efi --boot-directory="$MNT/boot" --efi-directory="$MNT/boot/efi" --removable "$LOOP" 2>/dev/null || true
              sudo grub-install --target=i386-pc --boot-directory="$MNT/boot" "$LOOP" 2>/dev/null || true
            fi
            sudo umount "$MNT"
            sudo losetup -d "$LOOP"
            rmdir "$MNT"
            gzip "$IMG"
            rm -rf "output-${ARCH}"
          done

          ls -lh vulos-*.img.gz

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p' || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)")
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          {
            echo "CHANGES<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          name: Vula OS ${{ steps.version.outputs.VERSION }}
          body: |
            ## Vula OS ${{ steps.version.outputs.VERSION }}

            ### Install on bare metal

            ### Bare metal (flash to USB)

            | Platform | File | Devices |
            |----------|------|---------|
            | x86_64 | `vulos-${{ steps.version.outputs.VERSION }}-x86_64.img.gz` | PC, laptop, server |
            | ARM64 | `vulos-${{ steps.version.outputs.VERSION }}-arm64.img.gz` | Raspberry Pi, Pine64, Rock64 |

            ```bash
            gunzip -c vulos-${{ steps.version.outputs.VERSION }}-x86_64.img.gz | sudo dd of=/dev/sdX bs=4M status=progress
            ```

            Or use [Balena Etcher](https://etcher.balena.io/) — drag and drop the `.img.gz` file.

            ### Cloud server

            ```bash
            ./build.sh --deploy YOUR_SERVER_IP --domain os.yourdomain.com
            ```

            ### Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            docker run -p 8080:8080 --shm-size=1g -v vulos-data:/root/.vulos ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ```

            ### Changes

            ${{ steps.changelog.outputs.CHANGES }}
          files: |
            vulos-*.img.gz
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-alpha') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
