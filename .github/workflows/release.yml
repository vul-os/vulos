name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # Build and push Docker image
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build flashable system images for bare metal install
      - name: Build system images
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # x86_64
          echo "Building x86_64 image..."
          docker buildx build --platform linux/amd64 --output type=docker -t vulos-amd64 .
          CONTAINER=$(docker create vulos-amd64)
          docker export $CONTAINER | gzip > "vulos-${VERSION}-x86_64.img.gz"
          docker rm $CONTAINER

          # ARM64
          echo "Building ARM64 image..."
          docker buildx build --platform linux/arm64 --output type=docker -t vulos-arm64 .
          CONTAINER=$(docker create vulos-arm64)
          docker export $CONTAINER | gzip > "vulos-${VERSION}-arm64.img.gz"
          docker rm $CONTAINER

          ls -lh vulos-*.img.gz

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p' || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)")
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          {
            echo "CHANGES<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          name: Vula OS ${{ steps.version.outputs.VERSION }}
          body: |
            ## Vula OS ${{ steps.version.outputs.VERSION }}

            ### Install on bare metal

            Download the image for your architecture, flash to a USB drive or SD card, and boot:

            | Platform | File | Use for |
            |----------|------|---------|
            | x86_64 | `vulos-${{ steps.version.outputs.VERSION }}-x86_64.img.gz` | PC, laptop, server |
            | ARM64 | `vulos-${{ steps.version.outputs.VERSION }}-arm64.img.gz` | Raspberry Pi, Pine64, Rock64 |

            **Flash with:**
            ```bash
            # Linux/macOS
            gunzip -c vulos-${{ steps.version.outputs.VERSION }}-x86_64.img.gz | sudo dd of=/dev/sdX bs=4M status=progress

            # Or use Balena Etcher — drag and drop the .img.gz file
            ```

            ### Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            docker run -p 8080:8080 --shm-size=1g -v vulos-data:/root/.vulos ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ```

            ### Changes

            ${{ steps.changelog.outputs.CHANGES }}
          files: |
            vulos-*.img.gz
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-alpha') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
